<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WS // MAINTENANCE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #333;
            --highlight: #888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Manrope', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-transform: uppercase;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Efek Garis TV Jadul */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            border: 1px solid var(--accent-color);
            padding: 30px;
            width: 100%;
            max-width: 550px;
            position: relative;
            z-index: 5;
            box-sizing: border-box;
        }

        .glitch {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(1.2rem, 5vw, 2rem); /* Responsif teks */
            margin-bottom: 25px;
            letter-spacing: 4px;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 15px;
        }

        .status-info {
            font-size: 0.75rem;
            color: var(--highlight);
            line-height: 2;
            margin-bottom: 25px;
        }

        /* Perbaikan Loading Bar */
        .loader-container {
            width: 100%;
            height: 1px; /* Dibuat tipis agar brutalist look */
            background: #222;
            position: relative;
            margin: 30px 0;
            overflow: hidden;
        }

        .loader-fill {
            position: absolute;
            height: 100%;
            width: 40%;
            background: #fff;
            animation: slide 2s infinite ease-in-out;
        }

        @keyframes slide {
            0% { left: -40%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .message {
            font-family: monospace;
            font-size: 0.85rem;
            color: #666;
            margin-top: 20px;
            display: block;
            line-height: 1.5;
        }

        .footer-sig {
            margin-top: 30px;
            font-size: 0.7rem;
            color: var(--accent-color);
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            .status-info {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch">MAINTENANCE_MODE</div>
        
        <div class="status-info">
            > STATUS: <span style="color: #fff;">OFFLINE</span><br>
            > TASK: OPTIMIZING_SYSTEM<br>
            > PROGRESS: RESTRUCTURING_FILES...
        </div>

        <div class="loader-container">
            <div class="loader-fill"></div>
        </div>

        <div class="message">
            SABAR YA CE ESSS!! <br>
        </div>

        <div class="footer-sig">
            -- W // SYAHBANII
        </div>
    </div>

</body>
</html>
