<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WS // SYSTEM MAINTENANCE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #444;
            --highlight: #888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Manrope', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Scanline Effect */
        body::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            border: 1px solid var(--accent-color);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 3;
        }

        .glitch {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
            letter-spacing: 4px;
            position: relative;
        }

        .status-log {
            font-size: 0.75rem;
            text-align: left;
            color: var(--highlight);
            line-height: 1.6;
            border-top: 1px solid var(--accent-color);
            padding-top: 20px;
            font-weight: 300;
        }

        .blink {
            animation: blinker 1s linear infinite;
            color: #fff;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        .loader-wrap {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #222;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            width: 30%;
            height: 100%;
            background: #fff;
            animation: move 1.5s infinite ease-in-out;
        }

        @keyframes move {
            0% { left: 0; width: 10%; }
            50% { width: 40%; }
            100% { left: 100%; width: 10%; }
        }

        .terminal-text {
            color: #666;
            font-family: monospace;
            margin-top: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch">MAINTENANCE_MODE</div>
        
        <div class="status-log">
            > STATUS: <span class="blink">OFFLINE</span><br>
            > TASK: OPTIMIZING_SYSTEM<br>
            > PROGRESS: RESTRUCTURING_FILES...<br>
            
            <div class="loader-wrap">
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>

            <span class="terminal-text">
                Sabar ya ce esss!! 
                <br><br>
                -- W // SYAHBANII
            </span>
        </div>
    </div>

</body>
</html>
