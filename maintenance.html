<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WS // MAINTENANCE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #333;
            --highlight: #888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Manrope', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-transform: uppercase;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Scanlines */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            border: 1px solid var(--accent-color);
            padding: 20px; /* Dikurangi paddingnya untuk mobile */
            width: 100%;
            max-width: 550px;
            z-index: 5;
            box-sizing: border-box;
            text-align: left; /* Menghindari teks rata tengah yang aneh saat wrap */
        }

        .glitch {
            font-family: 'Syncopate', sans-serif;
            /* Perbaikan di sini: Clamp font-size agar responsif dan word-wrap */
            font-size: clamp(1rem, 5vw, 1.8rem); 
            margin-bottom: 25px;
            letter-spacing: 2px; /* Dikurangi sedikit agar lebih muat */
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 15px;
            
            /* Properti tambahan untuk mengatasi overflow teks panjang */
            word-wrap: break-word; 
            overflow-wrap: break-word;
            hyphens: auto;
            white-space: normal; /* Biarkan teks membungkus ke baris baru jika perlu */
        }

        .status-info {
            font-size: 0.7rem; /* Diperkecil sedikit */
            color: var(--highlight);
            line-height: 1.8;
        }

        .loader-container {
            width: 100%;
            height: 1px;
            background: #222;
            position: relative;
            margin: 30px 0;
            overflow: hidden;
        }

        .loader-fill {
            position: absolute;
            height: 100%;
            width: 30%;
            background: #fff;
            animation: slide 2s infinite ease-in-out;
        }

        @keyframes slide {
            0% { left: -30%; }
            100% { left: 100%; }
        }

        .message {
            font-family: monospace;
            font-size: 0.8rem;
            color: #666;
            margin-top: 20px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: var(--accent-color);
        }

        /* Media Query untuk layar sangat kecil */
        @media (max-width: 350px) {
            .glitch {
                font-size: 1.1rem; /* Ukuran minimum untuk layar sempit */
                letter-spacing: 1px;
            }
            .container {
                padding: 15px;
            }
        }
    </style>
    <script>
        // Paksa hapus sisa service worker di device user
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
                for(let reg of regs) reg.unregister();
            });
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="glitch">MAINTENANCE_MODE</div>
        <div class="status-info">
            > STATUS: <span style="color: #fff;">OFFLINE</span><br>
            > TASK: OPTIMIZING_SYSTEM<br>
            > PROGRESS: RESTRUCTURING_FILES...
        </div>
        <div class="loader-container">
            <div class="loader-fill"></div>
        </div>
        <div class="message">SABAR YA CE ESSS!!</div>
        <div class="footer">-- W // SYAHBANII</div>
    </div>
</body>
</html>
